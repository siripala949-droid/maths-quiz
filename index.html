<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 10 Mathematics - Full Syllabus</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --primary: #bb86fc;
            --primary-hover: #9965f4;
            --danger: #cf6679;
            --success: #03dac6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden; /* No-scroll layout */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--container-bg);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* Start Screen */
        .header-title {
            text-align: center;
            margin-top: 40px;
            font-size: 24px;
            color: var(--primary);
        }
        .header-sub {
            text-align: center;
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 14px;
        }

        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: 40px;
            transition: background 0.2s;
        }

        .btn:active {
            background-color: var(--primary-hover);
        }

        /* Quiz Screen */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 20px;
            line-height: 1.5;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #2c2c2c;
            color: var(--text-color);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 18px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:active {
            background-color: #3a3a3a;
            border-color: var(--primary);
        }

        /* Result Screen */
        .result-container {
            overflow-y: auto; /* Allow scrolling inside results if table is long */
            flex-grow: 1;
            padding-bottom: 20px;
        }
        
        .result-container::-webkit-scrollbar {
            width: 5px;
        }
        .result-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            margin: 20px auto;
        }

        .motivation-box {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary);
            text-align: center;
            line-height: 1.5;
        }

        /* Print Table Styles (hidden on UI, used for PDF) */
        #pdf-content {
            display: none;
            background: white;
            color: black;
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 12px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .correct-text { color: green; font-weight: bold; }
        .incorrect-text { color: red; font-weight: bold; }

    </style>
</head>
<body>

<div id="app-container">
    
    <div id="start-screen" class="screen active">
        <h1 class="header-title">Grade 10 Mathematics</h1>
        <p class="header-sub">Full Syllabus Model Paper<br>Terms 1, 2, and 3</p>
        <div style="flex-grow: 1; display: flex; justify-content: center; align-items: center;">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="#bb86fc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
            </svg>
        </div>
        <button class="btn" onclick="startQuiz()">Start Exam</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="question-header">
            <span id="question-counter">Question 1 of 40</span>
            <span id="question-topic">Algebra</span>
        </div>
        <div id="question-text" class="question-text">
            Loading question...
        </div>
        <div id="options-container" class="options-container">
            </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-container">
            <h2 style="text-align: center; margin-top: 20px;">Exam Completed!</h2>
            <div class="score-circle" id="score-display">0/40</div>
            
            <div class="motivation-box" id="motivation-text">
                </div>

            <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">
                Download your detailed performance report below.
            </p>
        </div>
        
        <button class="btn" onclick="generatePDF()">Download PDF Report</button>
        <button class="btn" style="background-color: #333; color: white; margin-top: -30px;" onclick="location.reload()">Retake Exam</button>
    </div>

</div>

<div id="pdf-content">
    <h2 style="text-align: center; color: #333;">Grade 10 Mathematics - Performance Report</h2>
    <h3 id="pdf-score" style="text-align: center; color: #555;"></h3>
    <p id="pdf-motivation" style="text-align: center; font-style: italic; color: #666;"></p>
    <table>
        <thead>
            <tr>
                <th>Q#</th>
                <th>Topic</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="pdf-table-body">
            </tbody>
    </table>
</div>

<script>
    // ---------------------------------------------------------
    // BATCH 1: QUESTIONS 1 TO 15
    // Note for User: The system is designed for 40 questions. 
    // Ask for the next batch when ready.
    // ---------------------------------------------------------
    const questions = [
        {
            q: "What is the perimeter of a semicircle with a radius of 7cm? (Take π = 22/7)",
            options: ["22 cm", "36 cm", "14 cm", "44 cm"],
            ans: 1, // 22 + 14 = 36
            topic: "Perimeter"
        },
        {
            q: "Find the factors of x² - 9.",
            options: ["(x - 3)(x - 3)", "(x + 9)(x - 1)", "(x - 3)(x + 3)", "(x + 3)(x + 3)"],
            ans: 2,
            topic: "Algebraic Expressions"
        },
        {
            q: "Solve for x: 3x - 5 = 16",
            options: ["7", "6", "8", "5"],
            ans: 0,
            topic: "Equations"
        },
        {
            q: "A radio marked at Rs. 2000 is sold for Rs. 1800. What is the percentage discount?",
            options: ["10%", "15%", "20%", "5%"],
            ans: 0,
            topic: "Percentages"
        },
        {
            q: "Simplify the fraction: 1/4 + 2/5",
            options: ["3/9", "13/20", "3/20", "8/20"],
            ans: 1,
            topic: "Fractions"
        },
        {
            q: "The parallel sides of a trapezium are 8cm and 12cm. If the perpendicular height is 5cm, what is its area?",
            options: ["100 cm²", "40 cm²", "50 cm²", "60 cm²"],
            ans: 2,
            topic: "Area"
        },
        {
            q: "What is the mean of the data set: 4, 8, 12, 16, 20?",
            options: ["10", "12", "14", "16"],
            ans: 1,
            topic: "Statistics"
        },
        {
            q: "Find the Least Common Multiple (LCM) of 4x²y and 6xy².",
            options: ["12x²y²", "24x²y²", "2xy", "10x³y³"],
            ans: 0,
            topic: "Algebraic Fractions"
        },
        {
            q: "If the probability of rain tomorrow is 0.35, what is the probability that it will not rain?",
            options: ["0.55", "0.65", "0.75", "0.35"],
            ans: 1,
            topic: "Probability"
        },
        {
            q: "Write 2³ = 8 in logarithmic form.",
            options: ["log₂8 = 3", "log₃8 = 2", "log₈2 = 3", "log₂3 = 8"],
            ans: 0,
            topic: "Logarithms"
        },
        {
            q: "What is the gradient of the line given by the equation y = -2x + 4?",
            options: ["4", "-2", "2", "-4"],
            ans: 1,
            topic: "Graphs"
        },
        {
            q: "A cylinder has a base area of 50 cm² and a height of 10 cm. Find its volume.",
            options: ["500 cm³", "150 cm³", "5000 cm³", "250 cm³"],
            ans: 0,
            topic: "Volume"
        },
        {
            q: "Solve the inequality: 2x + 4 > 10",
            options: ["x > 3", "x < 3", "x > 7", "x > 6"],
            ans: 0,
            topic: "Inequalities"
        },
        {
            q: "If A = {1, 2, 3, 4} and B = {3, 4, 5, 6}, find A ∩ B.",
            options: ["{1, 2}", "{3, 4}", "{1, 2, 3, 4, 5, 6}", "{5, 6}"],
            ans: 1,
            topic: "Sets"
        },
        {
            q: "Two triangles are similar. The sides of the first are 3cm, 4cm, and 5cm. If the longest side of the second triangle is 15cm, what is its shortest side?",
            options: ["6 cm", "9 cm", "12 cm", "10 cm"],
            ans: 1,
            topic: "Geometry - Similarity"
        }
    ];

    // Variables for App State
    let currentQuestionIndex = 0;
    let score = 0;
    let userAnswers = []; // Array to store objects: {qNum, topic, isCorrect}

    // DOM Elements
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const questionCounter = document.getElementById('question-counter');
    const questionTopic = document.getElementById('question-topic');
    const progressFill = document.getElementById('progress-fill');
    
    function startQuiz() {
        startScreen.classList.remove('active');
        quizScreen.classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        // Clear previous options
        optionsContainer.innerHTML = '';
        
        const currentQ = questions[currentQuestionIndex];
        
        // Update headers and progress
        questionCounter.innerText = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
        questionTopic.innerText = currentQ.topic;
        progressFill.style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
        
        // Set question text
        questionText.innerText = currentQ.q;
        
        // Generate vertical mobile-first buttons
        currentQ.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.classList.add('option-btn');
            btn.innerText = option;
            btn.onclick = () => selectAnswer(index);
            optionsContainer.appendChild(btn);
        });
    }

    function selectAnswer(selectedIndex) {
        const currentQ = questions[currentQuestionIndex];
        const isCorrect = selectedIndex === currentQ.ans;
        
        if (isCorrect) score++;

        // Save data for PDF
        userAnswers.push({
            qNum: currentQuestionIndex + 1,
            topic: currentQ.topic,
            isCorrect: isCorrect
        });

        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');

        // Update Score UI
        document.getElementById('score-display').innerText = `${score}/${questions.length}`;

        // Smart Motivation Engine Logic
        const percentage = (score / questions.length) * 100;
        const motivationBox = document.getElementById('motivation-text');
        const pdfMotivation = document.getElementById('pdf-motivation');
        
        let advice = "";
        
        if (percentage < 40) {
            advice = "ඔබ ජ්‍යාමිතිය සහ වීජ ගණිතය කොටස් ගැන වැඩිපුර අවධානය යොමු කළ යුතුය. (You need to focus more on geometry and algebra). Don't give up, review your textbook and keep practicing!";
            motivationBox.style.borderLeftColor = "var(--danger)";
        } else if (percentage < 75) {
            advice = "හොඳ උත්සාහයක්! (Good effort!) You have a solid foundation, but focusing on your weaker topics will help you achieve an A grade easily.";
            motivationBox.style.borderLeftColor = "#ffeb3b"; // Yellow
        } else {
            advice = "ඉතා විශිෂ්ටයි! (Excellent!) You have mastered the Grade 10 syllabus perfectly. Keep this momentum going for your O/Ls!";
            motivationBox.style.borderLeftColor = "var(--success)";
        }

        motivationBox.innerText = advice;
        pdfMotivation.innerText = advice;

        // Populate PDF Table
        const tbody = document.getElementById('pdf-table-body');
        tbody.innerHTML = '';
        
        userAnswers.forEach(ans => {
            const tr = document.createElement('tr');
            
            const tdNum = document.createElement('td');
            tdNum.innerText = ans.qNum;
            
            const tdTopic = document.createElement('td');
            tdTopic.innerText = ans.topic;
            
            const tdStatus = document.createElement('td');
            tdStatus.innerText = ans.isCorrect ? "Correct" : "Incorrect";
            tdStatus.className = ans.isCorrect ? "correct-text" : "incorrect-text";
            
            tr.appendChild(tdNum);
            tr.appendChild(tdTopic);
            tr.appendChild(tdStatus);
            tbody.appendChild(tr);
        });

        document.getElementById('pdf-score').innerText = `Final Score: ${score} out of ${questions.length} (${percentage.toFixed(1)}%)`;
    }

    function generatePDF() {
        const element = document.getElementById('pdf-content');
        element.style.display = 'block'; // Make visible for capture

        const opt = {
            margin:       10,
            filename:     'Grade10_Math_Report.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Generate PDF, then hide the div again
        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none';
        });
    }
</script>

</body>
</html>
